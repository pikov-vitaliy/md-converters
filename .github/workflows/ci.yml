name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile check
        run: python -m py_compile convert_to_md.py

      - name: Install package
        run: pip install .

      - name: Smoke — HTML to Markdown
        run: |
          tomd examples/sample-report.html --force
          test -f examples/sample-report.md
          grep -q "Отчёт об уязвимостях" examples/sample-report.md
          echo "OK: HTML сконвертирован"

      - name: Smoke — CSV to Markdown via tomd
        run: |
          printf 'a,b\n1,2\n' > /tmp/t.csv
          tomd /tmp/t.csv --no-frontmatter --force
          grep -q "| a | b |" /tmp/t.md
          echo "OK: CSV сконвертирован в таблицу"
