name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  UV_LINK_MODE: copy

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 — минимум из requires-python, 3.14 — версия на машине автора.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install "uv>=0.11,<0.12"

      - name: Check lockfile
        run: uv lock --check

      - name: Sync locked environment
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Compile check
        run: uv run --frozen python -m py_compile convert_to_md.py tools/supply_chain_report.py

      - name: Lint (ruff)
        run: uv run --frozen ruff check convert_to_md.py tests tools

      - name: Unit tests
        run: uv run --frozen pytest -q

      # Вывод через -o в /tmp, чтобы не трогать tracked-файл examples/*.md.
      - name: Smoke — HTML to Markdown
        run: |
          uv run --frozen tomd examples/sample-report.html -o /tmp/out
          test -f /tmp/out/sample-report.md
          grep -q "Отчёт об уязвимостях" /tmp/out/sample-report.md
          echo "OK: HTML сконвертирован"

      - name: Smoke — CSV to Markdown via tomd
        run: |
          printf 'a,b\n1,2\n' > /tmp/t.csv
          uv run --frozen tomd /tmp/t.csv --no-frontmatter
          grep -q "| a | b |" /tmp/t.md
          echo "OK: CSV сконвертирован в таблицу"

      - name: Smoke — повтор без --force пропускает существующий .md
        run: |
          before="$(sha256sum /tmp/t.md | cut -d ' ' -f 1)"
          uv run --frozen tomd /tmp/t.csv --no-frontmatter
          after="$(sha256sum /tmp/t.md | cut -d ' ' -f 1)"
          test "$before" = "$after"
          echo "OK: без --force существующий .md не перезаписан"

      # «! cmd» под дефолтным bash -e не роняет шаг — нужен явный exit 1.
      - name: Smoke — флаг без значения даёт ошибку
        run: |
          if uv run --frozen tomd /tmp/t.csv -o; then
            echo "FAIL: -o без значения принят молча"; exit 1
          fi
          if uv run --frozen tomd /tmp/t.csv --only=; then
            echo "FAIL: --only= принят молча"; exit 1
          fi
          echo "OK: -o и --only без значения не игнорируются молча"

      - name: Unit — плейсхолдер data-URI не задевает соседнюю разметку
        run: |
          uv run --frozen python - <<'EOF'
          from convert_to_md import tidy
          out = tidy("[![l](data:image/png;base64,A)](https://e.com/x)\n",
                     keep_images=False)
          assert "[!\\[l]()](https://e.com/x)" in out, out
          out = tidy("![a](data:image/png;base64,A)"
                     "![b](data:image/png;base64,B)\n", keep_images=False)
          assert "![a]()" in out and "![b]()" in out, out
          out = tidy("![s](data:image/svg+xml;utf8,%3Csvg%3E(x)%3C/svg%3E)\n",
                     keep_images=False)
          assert "![s]()" in out, out
          EOF
          echo "OK: регексп data-URI не жадничает"

  smoke-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.12 — стабильная CI-опора, 3.14 — версия на машине автора.
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install "uv>=0.11,<0.12"

      - name: Sync locked environment
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Unit tests
        run: uv run --frozen pytest -q

      - name: Smoke — HTML to Markdown
        shell: bash
        run: |
          uv run --frozen tomd examples/sample-report.html -o out
          test -f out/sample-report.md
          grep -q "Отчёт об уязвимостях" out/sample-report.md
          echo "OK: HTML сконвертирован на Windows"

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install "uv>=0.11,<0.12"

      - name: Check lockfile
        run: uv lock --check

      - name: Export locked runtime requirements
        run: |
          uv --quiet export \
            --format requirements.txt \
            --no-dev \
            --no-emit-project \
            --locked \
            --output-file requirements-runtime-audit.txt

      - name: Export locked development requirements
        run: |
          uv --quiet export \
            --format requirements.txt \
            --all-groups \
            --no-emit-project \
            --locked \
            --output-file requirements-dev-audit.txt

      - name: Generate runtime CycloneDX SBOM
        run: |
          uv --quiet export \
            --format cyclonedx1.5 \
            --no-dev \
            --locked \
            --output-file cyclonedx-runtime-sbom.json

      - name: Generate development CycloneDX SBOM
        run: |
          uv --quiet export \
            --format cyclonedx1.5 \
            --all-groups \
            --locked \
            --output-file cyclonedx-dev-sbom.json

      - name: Sync runtime environment
        run: uv sync --frozen --no-dev --python 3.12

      - name: Generate license inventory
        run: |
          uv run --frozen --no-dev python tools/supply_chain_report.py \
            --output supply-chain-licenses.json \
            --fail-on-forbidden

      - name: Audit runtime dependencies
        run: |
          uv run --frozen pip-audit \
            --progress-spinner off \
            -r requirements-runtime-audit.txt

      - name: Audit development dependencies
        run: |
          uv run --frozen pip-audit \
            --progress-spinner off \
            -r requirements-dev-audit.txt

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supply-chain
          path: |
            cyclonedx-runtime-sbom.json
            cyclonedx-dev-sbom.json
            requirements-runtime-audit.txt
            requirements-dev-audit.txt
            supply-chain-licenses.json
