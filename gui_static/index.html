<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>md-converters</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;
background:#1a1a2e;color:#e0e0e0;padding:20px;max-width:900px;
margin:0 auto}
h1{font-size:1.4rem;margin-bottom:16px;color:#7f7fff}
.drop-zone{border:2px dashed #555;border-radius:12px;padding:40px;
text-align:center;cursor:pointer;transition:border-color .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:#7f7fff;
background:rgba(127,127,255,.05)}
.drop-zone p{margin:8px 0;color:#999}
.settings{margin:16px 0;padding:16px;background:#16213e;
border-radius:8px}
.settings label{display:inline-block;margin:4px 12px 4px 0;
cursor:pointer}
.settings input[type=text]{background:#1a1a2e;border:1px solid #444;
color:#e0e0e0;padding:6px 10px;border-radius:4px;width:100%;
margin-top:4px}
select{background:#1a1a2e;border:1px solid #444;color:#e0e0e0;
padding:4px;border-radius:4px}
.results{margin:16px 0}
.result-item{padding:10px 14px;margin:6px 0;background:#16213e;
border-radius:6px;display:flex;align-items:center;gap:10px}
.result-item .name{flex:1;font-family:monospace;font-size:.9rem}
.result-item .status{font-weight:bold;min-width:24px}
.result-item .actions{display:flex;gap:6px}
.btn{background:#7f7fff;color:#fff;border:none;padding:6px 14px;
border-radius:4px;cursor:pointer;font-size:.85rem}
.btn:hover{background:#6a6aff}
.btn-sm{padding:4px 10px;font-size:.8rem}
.preview-section{margin:16px 0}
.preview-section pre{background:#0f0f23;border:1px solid #333;
border-radius:6px;padding:14px;overflow-x:auto;
white-space:pre-wrap;font-size:.85rem;line-height:1.5;max-height:
500px;overflow-y:auto}
#preview{background:#0f0f23;border:1px solid #333;border-radius:6px;
padding:14px;max-height:500px;overflow-y:auto;line-height:1.6}
#preview h1,#preview h2,#preview h3{color:#9f9fff;margin:12px 0 6px}
#preview h1{font-size:1.3rem}#preview h2{font-size:1.15rem}
#preview h3{font-size:1rem}
#preview table{border-collapse:collapse;width:100%;margin:8px 0}
#preview th,#preview td{border:1px solid #444;padding:6px 10px;
text-align:left}
#preview th{background:#1a1a3e}
#preview code{background:#222;padding:2px 5px;border-radius:3px;
font-family:monospace;font-size:.85rem;color:#ffcc66}
#preview pre{background:#0a0a18;padding:10px;border-radius:4px;
overflow-x:auto;margin:8px 0}
#preview pre code{background:none;padding:0;color:#e0e0e0}
#preview blockquote{border-left:3px solid #555;margin:8px 0;
padding-left:12px;color:#999}
#preview a{color:#7f7fff}
#preview img{max-width:100%}
#preview img[src=""],#preview img:not([src]){display:none}
#preview hr{border:none;border-top:1px solid #333;margin:10px 0}
.url-section{display:flex;gap:8px;margin:16px 0}
.url-section input{flex:1;background:#16213e;border:1px solid #444;
color:#e0e0e0;padding:8px;border-radius:4px}
.progress{margin:8px 0;color:#ffcc00;font-size:.85rem}
.section-title{font-size:1rem;color:#aaa;margin:16px 0 8px;
border-bottom:1px solid #333;padding-bottom:4px}
</style>
</head>
<body>
<h1>md-converters <span id="ver" style="font-size:.8rem;color:#666"></span></h1>

<div class="drop-zone" id="dropZone">
  <p><strong>Перетащите файлы сюда</strong></p>
  <p>или нажмите «Выбрать»</p>
  <p style="font-size:.8rem;color:#666">PDF, HTML, DOCX, XLSX, PPTX, CSV, JSON</p>
  <input type="file" id="fileInput" multiple
  style="display:none">
</div>

<div class="settings">
  <label><input type="checkbox" id="force" onchange="save()"> Перезаписать (force)</label>
  <label><input type="checkbox" id="frontmatter" checked onchange="save()"> YAML front-matter</label>
  <label><input type="checkbox" id="keepImages" onchange="save()"> Сохранить картинки</label>
  <label><input type="checkbox" id="pdfTables" checked onchange="save()"> PDF-таблицы</label>
  <br>
  <label style="display:inline-block;margin-top:8px">Форматы:
    <select id="only" onchange="save()">
      <option value="">все</option>
      <option value="pdf">только PDF</option>
      <option value="html,htm">только HTML</option>
      <option value="docx">только DOCX</option>
      <option value="xlsx">только XLSX</option>
    </select>
  </label>
  <br>
  <label style="display:block;margin-top:8px">Папка вывода:
    <input type="text" id="outDir" placeholder="(рядом с источником)" onchange="save()">
  </label>
</div>

<div class="url-section">
  <input type="text" id="urlInput" placeholder="https://example.com/report"
  onkeydown="if(event.key==='Enter')convertURL()">
  <button class="btn" onclick="convertURL()">Конвертировать URL</button>
</div>

<!-- ② Выбор с диска: конвертация НА МЕСТЕ (.md рядом с источником) -->
<div style="display:flex;gap:8px;align-items:center;margin:16px 0;
flex-wrap:wrap">
  <span style="color:#aaa;font-size:.9rem">С диска (на месте,
  .md рядом с файлом):</span>
  <button class="btn" onclick="convertPicked('files')">Выбрать
  файлы…</button>
  <button class="btn" onclick="convertPicked('folder')">Выбрать
  папку…</button>
</div>

<!-- ③ Папка через браузер → один .zip (структура сохранена) -->
<div style="display:flex;gap:8px;align-items:center;margin:16px 0;
flex-wrap:wrap">
  <span style="color:#aaa;font-size:.9rem">Папка через браузер
  (скачать .zip):</span>
  <input type="file" id="dirInput" webkitdirectory directory multiple
  style="display:none">
  <button class="btn"
  onclick="document.getElementById('dirInput').click()">Папка →
  ZIP</button>
</div>

<div class="section-title">Результаты</div>
<div class="results" id="results"></div>

<div class="preview-section" id="previewSection" style="display:none">
  <div class="section-title">Превью: <span id="previewTitle">—</span></div>
  <div id="preview"></div>
</div>

<script src="/static/marked.min.js"></script>
<script src="/static/purify.min.js"></script>
<script>
let currentPreview = "";

function loadSettings() {
  try {
    const s = JSON.parse(
      localStorage.getItem("md-conv-settings") || "{}"
    );
    if (s.force !== undefined)
      document.getElementById("force").checked = s.force;
    if (s.frontmatter !== undefined)
      document.getElementById("frontmatter").checked = s.frontmatter;
    if (s.keepImages !== undefined)
      document.getElementById("keepImages").checked = s.keepImages;
    if (s.pdfTables !== undefined)
      document.getElementById("pdfTables").checked = s.pdfTables;
    if (s.only)
      document.getElementById("only").value = s.only;
    if (s.outDir)
      document.getElementById("outDir").value = s.outDir;
  } catch(e) {}
}

function save() {
  const s = {
    force: document.getElementById("force").checked,
    frontmatter: document.getElementById("frontmatter").checked,
    keepImages: document.getElementById("keepImages").checked,
    pdfTables: document.getElementById("pdfTables").checked,
    only: document.getElementById("only").value,
    outDir: document.getElementById("outDir").value,
  };
  localStorage.setItem("md-conv-settings", JSON.stringify(s));
}

function getFlags() {
  const pdfTables = document.getElementById("pdfTables").checked
    ? "auto" : "off";
  return {
    force: document.getElementById("force").checked,
    frontmatter: document.getElementById("frontmatter").checked,
    keep_images: document.getElementById("keepImages").checked,
    pdf_tables: pdfTables,
    only: document.getElementById("only").value || null,
    out_dir: document.getElementById("outDir").value || null,
  };
}

function checkSize(file) {
  const maxMB = 100;
  if (file.size > maxMB * 1024 * 1024) {
    alert("Файл " + file.name + ": "
      + (file.size / 1048576).toFixed(0)
      + " МБ — лимит " + maxMB + " МБ");
    return false;
  }
  return true;
}

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files.length > 0)
    convertFiles(fileInput.files);
});
dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("drag-over");
});
dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag-over");
});
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  convertFiles(e.dataTransfer.files);
});

const dirInput = document.getElementById("dirInput");
if (dirInput) {
  dirInput.addEventListener("change", () => {
    if (dirInput.files.length > 0)
      convertFolderZip(dirInput.files);
  });
}

function addResult(name, status, extra) {
  var div = document.createElement("div");
  div.className = "result-item";
  div.setAttribute("data-file", name);
  div.setAttribute("data-status", status);
  var icons = {ok:"\u2705", skip:"\u23ed\ufe0f",
    fail:"\u274c", pending:"\u23f3"};
  var icon = icons[status] || "\u23f3";
  // L1: name через textContent, не innerHTML (защита от XSS)
  div.innerHTML = '<span class="status">' + icon +
    '</span><span class="name"></span>' +
    '<span class="actions">' + (extra||"") + '</span>';
  div.querySelector(".name").textContent = name;
  document.getElementById("results").prepend(div);
  return div;
}

// Общий читатель SSE-потока (text/event-stream через fetch)
async function readStream(resp) {
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream: true});
    const parts = buf.split("\n\n");
    buf = parts.pop();
    for (const part of parts) {
      if (!part.trim()) continue;
      handleSSE(JSON.parse(part.replace(/^data: /, "")));
    }
  }
}

function flagsToForm(fd, skipOutDir) {
  const flags = getFlags();
  Object.keys(flags).forEach(k => {
    if (skipOutDir && k === "out_dir") return;
    if (flags[k] !== null && flags[k] !== false)
      fd.append(k, flags[k]);
  });
  return fd;
}

async function convertFiles(fileList) {
  const files = Array.from(fileList).filter(checkSize);
  if (files.length === 0) return;
  const fd = new FormData();
  files.forEach(f => fd.append("files", f));
  flagsToForm(fd, false);
  const resp = await fetch("/api/convert/files", {
    method: "POST", body: fd,
  });
  await readStream(resp);
}

async function convertURL() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) return;
  // url + флаги идут в ТЕЛЕ (бэкенд читает их через Form), не в query
  const fd = new FormData();
  fd.append("url", url);
  flagsToForm(fd, false);
  const resp = await fetch("/api/convert/url", {
    method: "POST", body: fd,
  });
  await readStream(resp);
}

// ② Конвертация по выбору из родного диалога ОС (на месте)
async function convertPicked(kind) {
  const fd = new FormData();
  fd.append("kind", kind);
  flagsToForm(fd, true);   // out_dir не нужен — пишем рядом с источником
  const resp = await fetch("/api/convert/picked", {
    method: "POST", body: fd,
  });
  await readStream(resp);
}

// ③ Папка из браузера → один .zip (структура сохранена)
async function convertFolderZip(fileList) {
  const files = Array.from(fileList).filter(checkSize);
  if (files.length === 0) return;
  const fd = new FormData();
  const paths = [];
  files.forEach(f => {
    fd.append("files", f);
    paths.push(f.webkitRelativePath || f.name);
  });
  fd.append("paths", JSON.stringify(paths));
  flagsToForm(fd, true);   // out_dir не нужен — отдаём zip
  const resp = await fetch("/api/convert/zip", {
    method: "POST", body: fd,
  });
  await readStream(resp);
}

function downloadZip(zipId) {
  window.open(
    "/api/download_zip?zip_id=" + encodeURIComponent(zipId)
  );
}

function handleSSE(data) {
  if (data.event === "cancelled") {
    return;  // выбор в диалоге отменён — ничего не делаем
  }
  if (data.event === "zip") {
    if (data.zip_id) {
      var zdiv = document.createElement("div");
      zdiv.className = "result-item";
      zdiv.style.background = "#16313e";
      var znm = document.createElement("span");
      znm.className = "name";
      znm.textContent = "Архив готов: " + data.count + " файл(ов)";
      var zact = document.createElement("span");
      zact.className = "actions";
      var zb = document.createElement("button");
      zb.className = "btn btn-sm";
      zb.textContent = "Скачать всё (.zip)";
      zb.addEventListener("click", function() {
        downloadZip(data.zip_id);
      });
      zact.appendChild(zb);
      zdiv.appendChild(znm);
      zdiv.appendChild(zact);
      document.getElementById("results").prepend(zdiv);
    }
    return;
  }
  if (data.event === "start") {
    addResult(data.file, "pending");
  } else if (data.event === "done") {
    // Удаляем «pending» карточку для этого файла
    var items = document.querySelectorAll(".result-item");
    items.forEach(function(el) {
      if (el.getAttribute("data-file") === data.file
          && el.getAttribute("data-status") === "pending")
        el.remove();
    });

    var icons = {ok:"\u2705", skip:"\u23ed\ufe0f",
      fail:"\u274c", pending:"\u23f3"};
    var div = document.createElement("div");
    div.className = "result-item";
    div.setAttribute("data-file", data.file);
    div.setAttribute("data-status", data.status);

    // L1: name через textContent, не innerHTML (защита от XSS)
    div.innerHTML = '<span class="status">' +
      (icons[data.status]||"\u23f3") +
      '</span><span class="name"></span>' +
      '<span class="actions"></span>';
    div.querySelector(".name").textContent = data.file;

    var actions = div.querySelector(".actions");

    // Кнопка «Превью» — показывает превью этого файла
    if (data.preview) {
      var btnPv = document.createElement("button");
      btnPv.className = "btn btn-sm";
      btnPv.textContent = "Превью";
      btnPv.addEventListener("click", function() {
        showPreview(data.preview);
      });
      actions.appendChild(btnPv);
    }

    // Кнопка «Скачать» — скачивает .md
    if (data.download_id) {
      var btnDl = document.createElement("button");
      btnDl.className = "btn btn-sm";
      btnDl.innerHTML = "\u2B07";
      btnDl.addEventListener("click", function() {
        download(data.download_id);
      });
      actions.appendChild(btnDl);
    }

    // Путь сохранённого .md (для «на месте» / out_dir)
    if (data.output) {
      var outDiv = document.createElement("div");
      outDiv.style.cssText = "color:#888;font-size:.75rem;"
        + "padding:2px 14px;margin-left:24px;word-break:break-all";
      outDiv.textContent = "→ " + data.output;
      div.appendChild(outDiv);
    }

    document.getElementById("results").prepend(div);

    // Автопревью первого успешного результата
    if (data.preview && data.status === "ok") {
      showPreview(data.preview);
    }

    // Показать ошибку
    if (data.status === "fail" && data.log) {
      var errDiv = document.createElement("div");
      errDiv.style.cssText = "color:#ff6666;font-size:.8rem;"
        + "padding:4px 14px;margin-left:24px";
      errDiv.textContent = data.log.substring(0, 200);
      div.appendChild(errDiv);
    }
  } else if (data.event === "error") {
    addResult(data.file, "fail");
    if (data.error) {
      var items2 = document.querySelectorAll(".result-item");
      items2.forEach(function(el) {
        if (el.getAttribute("data-file") === data.file
            && el.getAttribute("data-status") === "fail") {
          var e = document.createElement("div");
          e.style.cssText = "color:#ff6666;font-size:.8rem;"
            + "padding:4px 14px;margin-left:24px";
          e.textContent = data.error;
          el.appendChild(e);
        }
      });
    }
  }
}

// YAML-шапка ---...--- в начале .md не понимается marked (видит её
// как setext-заголовок → огромный жирный блок). В ПРЕВЬЮ её убираем
// (в самом .md-файле она остаётся). Метаданные кладём в <details>.
function splitFrontMatter(md) {
  var m = md.match(
    /^---\r?\n([\s\S]*?)\r?\n---[ \t]*\r?\n?/
  );
  if (!m) return {meta: "", body: md};
  return {meta: m[1], body: md.slice(m[0].length)};
}

function esc(s) {
  return s.replace(/&/g, "&amp;")
    .replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function showPreview(text) {
  if (text) currentPreview = text;
  if (!currentPreview) return;
  document.getElementById("previewSection").style.display = "block";
  var el = document.getElementById("preview");
  var fm = splitFrontMatter(currentPreview);
  // Метаданные — компактно и сворачиваемо, не мешают контенту
  var metaHtml = fm.meta
    ? '<details style="margin-bottom:10px;color:#888;'
      + 'font-size:.8rem"><summary style="cursor:pointer">'
      + 'метаданные (front-matter)</summary><pre>'
      + esc(fm.meta) + '</pre></details>'
    : "";
  // BLK-7: marked рендерит контент, DOMPurify чистит от XSS
  if (typeof marked !== "undefined"
      && typeof DOMPurify !== "undefined") {
    try {
      el.innerHTML = metaHtml
        + DOMPurify.sanitize(marked.parse(fm.body));
    } catch(e) {
      el.innerHTML = metaHtml + "<pre>" + esc(fm.body) + "</pre>";
    }
  } else {
    el.innerHTML = metaHtml + "<pre>" + esc(fm.body) + "</pre>";
  }
  document.getElementById("previewSection")
    .scrollIntoView({behavior:"smooth", block:"nearest"});
}

function download(dlId) {
  window.open("/api/download?dl_id=" + encodeURIComponent(dlId));
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    document.getElementById("previewSection")
      .style.display = "none";
  }
});

setInterval(() => fetch("/api/heartbeat", {method: "POST"}), 5000);
loadSettings();
fetch("/api/flags").then(r => r.json()).then(d => {
  document.getElementById("ver").textContent = "v" + d.version;
});
</script>
</body>
</html>
